name: pocketledger
description: Offline-first personal finance tracker with local agentic architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0
  fl_chart: ^1.2.0
  local_auth: ^3.0.1
  file_picker: ^12.0.0-beta.5
  csv: ^8.0.0
  pdf_text: ^0.5.0
  share_plus: ^13.1.0
  uuid: ^4.4.0
  intl: ^0.20.2
  collection: ^1.18.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  drift_dev: ^2.34.0
  build_runner: ^2.15.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.4
  mocktail: ^1.0.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - test_resources/
